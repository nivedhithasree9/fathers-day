<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Father&#8217;s Day</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #ffe4b2, #f7c17c 40%, #f5b65f 100%);
      color: #3b2f2f;
    }
    .card {
      max-width: 700px;
      padding: 40px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 3rem;
      letter-spacing: -0.04em;
    }
    p {
      margin: 1rem 0;
      line-height: 1.6;
      font-size: 1.1rem;
    }
    .highlight {
      color: #c76b18;
      font-weight: 700;
    }
    .signature {
      margin-top: 2rem;
      font-size: 1rem;
      color: #7a5f41;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Happy Father&#8217;s Day</h1>
    <p>To the best dad, thank you for your love, support, and the little moments that mean the most.</p>
    <p class="highlight">Today is your day — enjoy every smile, every laugh, and every proud moment.</p>
    <p class="signature">With love, from your family.</p>
  </div>
</body>
</html>
